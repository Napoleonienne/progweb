<!DOCTYPE html>
<html>
 <head>
  <meta charset="utf-8">
  <title>Le lièvre et la tortue</title>
  <script>
   "use strict";
    var torture =0;
    var lapin =0;


    function uniform(n){

        let res =0;
        var seed =Date.now();
        let r = seed%n+1;

        return r;
    }
    function etape(torture,lapin){
        let n =uniform(20)
        if (n<15 )
            torture += n;
        else
            lapin += n;
        return torture,lapin;

    }

    function course(n){
        let lapin =0;
        let tortue =0;
        let tabeau =  [0,0]
        tabeau[0] = ["lapin","torture"]
        tabeau[1] = [0,0]

        for(let i=0; i<n; i++){
            temp = etape(tortue,lapin);
            tabeau[1][0] += temp[1]
            tabeau[1][1] += temp[0]


        };
        
        return tabeau

    }

    console.log((course(5000)))





  </script>
 </head>
 <body>
  <h2>Le lièvre et la tortue</h2>
 </body>
</html>
